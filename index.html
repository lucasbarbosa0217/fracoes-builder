<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Frações v5</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --primary:#FF6B6B; --secondary:#4ECDC4; --bg:#F7F9FC; --text:#2D3436; }
        body { font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text); margin:0; padding:20px; }
        .container { max-width:1300px; margin:0 auto; background:white; padding:30px; border-radius:8px; border:1px solid #e1e1e1; }
        .header { display:flex; gap:10px; margin-bottom:25px; border-bottom:2px solid #eee; overflow-x:auto; }
        .tab-btn { padding:12px 25px; cursor:pointer; border:none; background:none; font-size:1rem; font-weight:bold; color:#b2bec3; transition:0.3s; white-space:nowrap; }
        .tab-btn.active { color:var(--primary); border-bottom:4px solid var(--primary); }
        .panel { display:none; } .panel.active { display:block; }
        .controls { display:flex; gap:20px; align-items:center; flex-wrap:wrap; margin-bottom:20px; padding:20px; background:#f8f9fa; border-radius:8px; }
        .input-group { background:white; padding:10px 15px; border-radius:8px; display:flex; align-items:center; gap:10px; border:1px solid #ddd; }
        input[type="number"] { width:55px; border:none; font-weight:900; font-size:1.2rem; outline:none; text-align:center; }
        input[type="range"] { flex-grow:1; cursor:pointer; accent-color:var(--primary); }
        select { border:none; font-weight:bold; padding:5px; cursor:pointer; background:transparent; font-size:1rem; }
        input[type="color"] { border:none; width:35px; height:35px; cursor:pointer; background:none; }
        .scroll-wrapper { width:100%; overflow-x:auto; background:transparent; border:1px solid #eee; border-radius:8px; margin-bottom:15px; }
        .capture-zone { padding:50px; background:transparent; display:inline-flex; }
        .result-row { display:flex; align-items:center; flex-wrap:nowrap; gap:40px; }
        .fraction-group { display:flex; flex-direction:column; align-items:center; gap:20px; flex-shrink:0; }
        .unit-stack { display:flex; gap:15px; flex-wrap:nowrap; justify-content:center; }
        .math-label { text-align:center; font-weight:900; font-size:34px; margin-top:10px; position:relative; }
        .fraction-line { border-bottom:4px solid #333; width:60px; margin:8px auto; }
        .math-symbol { font-size:60px; font-weight:bold; margin:0 15px; flex-shrink:0; }
        .op-indicator { font-size:14px; color:var(--primary); font-weight:bold; position:absolute; left:110%; }
        .op-top { top:0; } .op-bot { bottom:0; }
        .btn-group { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
        .btn { padding:12px 25px; border-radius:8px; cursor:pointer; font-weight:bold; font-size:1rem; border:none; transition:0.2s; color:white; }
        .btn-copy { background:var(--secondary); } .btn-download { background:#6c5ce7; }
        .btn-add { background:#00b894; } .btn-remove { background:#d63031; padding:6px 12px; font-size:0.85rem; }
        .switch-container { display:flex; align-items:center; gap:10px; background:white; padding:10px; border-radius:8px; border:1px solid #ddd; }
        .switch-btn { padding:5px 15px; border-radius:6px; border:none; cursor:pointer; font-weight:bold; background:#eee; transition:0.2s; }
        .switch-btn.active { background:var(--primary); color:white; }
        .info-tag { background:#ffeaa7; color:#d6a000; padding:8px 15px; border-radius:6px; font-size:0.9rem; font-weight:bold; }
        .checkbox-label { display:flex; align-items:center; gap:8px; font-weight:bold; font-size:0.9rem; cursor:pointer; background:white; padding:10px 15px; border-radius:8px; border:1px solid #ddd; user-select:none; }
        .checkbox-label input[type="checkbox"] { width:18px; height:18px; cursor:pointer; accent-color:var(--primary); }
        .reta-fractions-list { display:flex; flex-direction:column; gap:10px; margin-bottom:20px; padding:15px; background:#f8f9fa; border-radius:8px; }
        .reta-fraction-row { display:flex; align-items:center; gap:12px; background:white; padding:10px 15px; border-radius:8px; border:1px solid #ddd; flex-wrap:wrap; }
        #toast { visibility:hidden; position:fixed; left:50%; bottom:30px; transform:translateX(-50%); background:#2d3436; color:white; padding:12px 25px; border-radius:8px; font-weight:bold; z-index:1000; }
        #toast.show { visibility:visible; animation:fadeInOut 2.5s; }
        @keyframes fadeInOut { 0%{opacity:0;bottom:0} 20%{opacity:1;bottom:30px} 80%{opacity:1;bottom:30px} 100%{opacity:0;bottom:0} }
        .warn-badge { background:#fab1a0; color:#6d3a2a; padding:8px 14px; border-radius:6px; font-size:0.85rem; font-weight:bold; display:none; }
        .section-title { font-size:0.8rem; font-weight:bold; color:#b2bec3; text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; }
    </style>
</head>
<body>
<div id="toast">Ação Concluída</div>
<div class="container">
    <div class="header">
        <button class="tab-btn active" onclick="switchTab(event,'visualizer')">Visualizador</button>
        <button class="tab-btn" onclick="switchTab(event,'calculator')">Calculadora</button>
        <button class="tab-btn" onclick="switchTab(event,'equivalent')">Equivalência</button>
        <button class="tab-btn" onclick="switchTab(event,'numberline')">Reta Real</button>
        <button class="tab-btn" onclick="switchTab(event,'quiz')">Quiz</button>
    </div>

    <div id="visualizer" class="panel active">
        <div class="controls">
            <div class="input-group">
                <input type="number" id="v-num" value="3" oninput="render()">
                <span>/</span>
                <input type="number" id="v-den" value="4" min="1" oninput="checkDen(); render();">
            </div>
            <select id="v-shape" onchange="render()">
                <option value="circle">Círculos</option>
                <option value="rect" selected>Retângulos</option>
                <option value="star">Estrelas</option>
                <option value="poly">Polígonos</option>
            </select>
            <input type="color" id="v-color" value="#FF6B6B" oninput="render()">
            <label class="checkbox-label"><input type="checkbox" id="v-hide-label" onchange="render()"> Ocultar fração</label>
            <span id="v-warn" class="warn-badge">⚠ Muitas imagens!</span>
        </div>
        <div class="scroll-wrapper"><div id="v-capture" class="capture-zone"><div id="viz-output" class="result-row"></div></div></div>
        <div class="btn-group">
            <button class="btn btn-copy" onclick="copyImage('v-capture')">Copiar</button>
            <button class="btn btn-download" onclick="downloadImage('v-capture')">Baixar</button>
        </div>
    </div>

    <div id="calculator" class="panel">
        <div class="controls">
            <div class="input-group">
                <input type="number" id="c1-num" value="1" oninput="renderCalc()">
                <span>/</span>
                <input type="number" id="c1-den" value="2" min="1" oninput="renderCalc()">
            </div>
            <select id="c-op" onchange="renderCalc()"><option value="+">+</option><option value="-">-</option></select>
            <div class="input-group">
                <input type="number" id="c2-num" value="1" oninput="renderCalc()">
                <span>/</span>
                <input type="number" id="c2-den" value="4" min="1" oninput="renderCalc()">
            </div>
            <input type="color" id="c-color" value="#4ECDC4" oninput="renderCalc()">
            <label class="checkbox-label"><input type="checkbox" id="c-hide-label" onchange="renderCalc()"> Ocultar fração</label>
            <span id="c-warn" class="warn-badge">⚠ Muitas imagens!</span>
        </div>
        <div class="scroll-wrapper"><div id="c-capture" class="capture-zone"><div id="calc-output" class="result-row"></div></div></div>
        <div class="btn-group">
            <button class="btn btn-copy" onclick="copyImage('c-capture')">Copiar</button>
            <button class="btn btn-download" onclick="downloadImage('c-capture')">Baixar</button>
        </div>
    </div>

    <div id="equivalent" class="panel">
        <div class="controls">
            <div class="input-group">
                <input type="number" id="e-num" value="4" oninput="updateEquivUI()">
                <span>/</span>
                <input type="number" id="e-den" value="8" min="1" oninput="updateEquivUI()">
            </div>
            <div class="switch-container">
                <button id="btn-mode-mult" class="switch-btn active" onclick="setEquivMode('mult')">Multiplicar</button>
                <button id="btn-mode-div" class="switch-btn" onclick="setEquivMode('div')">Simplificar</button>
            </div>
            <div id="wrapper-mult" style="display:flex;align-items:center;gap:10px;flex-grow:1;">
                <span style="font-weight:bold;white-space:nowrap;">Fator: <span id="e-mult-label">1</span></span>
                <input type="range" id="e-slider-mult" min="1" max="10" value="1" oninput="renderEquiv()">
            </div>
            <div id="wrapper-div" style="display:none;align-items:center;gap:10px;flex-grow:1;">
                <span style="font-weight:bold;white-space:nowrap;">Divisor: <span id="e-div-label">1</span></span>
                <input type="range" id="e-slider-div" min="0" max="0" value="0" oninput="renderEquiv()">
            </div>
            <span id="irredutivel-msg" class="info-tag" style="display:none">Irredutível</span>
            <input type="color" id="e-color" value="#FFD93D" oninput="renderEquiv()">
            <label class="checkbox-label"><input type="checkbox" id="e-hide-label" onchange="renderEquiv()"> Ocultar fração</label>
            <span id="e-warn" class="warn-badge">⚠ Muitas imagens!</span>
        </div>
        <div class="scroll-wrapper"><div id="e-capture" class="capture-zone"><div id="equiv-output" class="result-row"></div></div></div>
        <div class="btn-group">
            <button class="btn btn-copy" onclick="copyImage('e-capture')">Copiar</button>
            <button class="btn btn-download" onclick="downloadImage('e-capture')">Baixar</button>
        </div>
    </div>

    <div id="numberline" class="panel">
        <div class="controls">
            <label class="checkbox-label"><input type="checkbox" id="r-hide-label" onchange="renderReta()"> Ocultar frações</label>
        </div>
        <div id="reta-fractions-list" class="reta-fractions-list"></div>
        <div style="margin-bottom:15px;">
            <button class="btn btn-add" onclick="addRetaFraction()">+ Adicionar fração</button>
        </div>
        <div class="scroll-wrapper">
            <div id="r-capture" class="capture-zone">
                <canvas id="retaCanvas" width="900" height="240"></canvas>
            </div>
        </div>
        <div class="btn-group">
            <button class="btn btn-copy" onclick="copyImage('r-capture')">Copiar</button>
            <button class="btn btn-download" onclick="downloadImage('r-capture')">Baixar</button>
        </div>
    </div>

    <div id="quiz" class="panel">
        <div style="padding:20px;background:#f8f9fa;border-radius:8px;margin-bottom:20px;display:flex;gap:20px;flex-wrap:wrap;align-items:center;">
            <div>
                <div class="section-title">Tipo de Quiz</div>
                <select id="q-type" onchange="newQuizQuestion()" style="border:1px solid #ddd;border-radius:6px;padding:8px 12px;font-weight:bold;font-size:1rem;background:white;">
                    <option value="visual">Identificar (Visual)</option>
                    <option value="reta">Identificar (Reta Real)</option>
                    <option value="equiv">Frações Equivalentes</option>
                </select>
            </div>
            <div>
                <div class="section-title">Dificuldade</div>
                <select id="q-diff" onchange="newQuizQuestion()" style="border:1px solid #ddd;border-radius:6px;padding:8px 12px;font-weight:bold;font-size:1rem;background:white;">
                    <option value="easy">Fácil (den ≤ 4)</option>
                    <option value="med" selected>Médio (den ≤ 8)</option>
                    <option value="hard">Difícil (den ≤ 12)</option>
                </select>
            </div>
            <div style="margin-left:auto;text-align:center;">
                <div class="section-title">Pontuação</div>
                <div style="font-size:1.4rem;font-weight:900;color:#6c5ce7;"><span id="q-score">0</span> / <span id="q-total">0</span></div>
            </div>
        </div>

        <div id="quiz-area" style="text-align:center;">
            <div id="quiz-visual" style="display:inline-flex;justify-content:center;margin-bottom:20px; min-height: 150px;"></div>
            <div id="quiz-question-text" style="font-size:1.1rem;font-weight:bold;color:#636e72;margin-bottom:16px;">Que fração está representada?</div>
            <div id="quiz-options" style="display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin-bottom:24px;"></div>
            <div id="quiz-feedback" style="font-size:1.3rem;font-weight:900;min-height:36px;"></div>
            <button class="btn" style="background:#6c5ce7;margin-top:16px;" onclick="newQuizQuestion()">Próxima →</button>
        </div>
    </div>
</div>

<script>
const gcd=(a,b)=>b===0?Math.abs(a):gcd(b,a%b);
const lcm=(a,b)=>Math.abs(a*b)/(gcd(a,b)||1);
const rnd=(min,max)=>Math.floor(Math.random()*(max-min+1))+min;

let equivMode='mult', currentDivisors=[1];
let retaFractions=[{num:1,den:4},{num:3,den:4}];
const POINT_COLORS=['#6c5ce7','#e17055','#00b894','#0984e3','#e84393','#d63031','#00cec9','#fdcb6e'];
let quizScore=0, quizTotal=0, quizAnswer=null, quizAnswered=false;
function drawSVG(shape, filled, total, color) {
    const width = 280;
    let height = 280; 
    const padding = 20;
    const minBlockSize = 25; 
    
    const cx = width / 2;
    const offColor = 'rgba(220,220,220,0.55)';
    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');

    function getBestGrid(n) {
        // 1. REGRA: Quadrados Perfeitos (Sempre N x N, sem limite de colunas/linhas)
        const sqrt = Math.sqrt(n);
        if (Number.isInteger(sqrt)) {
            return { cols: sqrt, rows: sqrt };
        }

        // 2. LÓGICA PADRÃO: Tentar divisores exatos respeitando o limite de 12 colunas
        const maxCols = 12;
        let bestExact = null;
        for (let c = 2; c <= maxCols; c++) {
            if (n % c === 0) {
                const r = n / c;
                const diff = Math.abs(c - r);
                if (!bestExact || diff < bestExact.diff) {
                    bestExact = { cols: c, rows: r, diff: diff };
                }
            }
        }

        // 3. REGRA DE EXCEÇÃO: Evitar "tripas" verticais
        // Se a melhor divisão tiver mais de 12 linhas E poucas colunas (<= 4), tratamos como primo
        if (bestExact && bestExact.rows > 12 && bestExact.cols <= 4) {
            bestExact = null; 
        }
        
        if (bestExact) return { cols: bestExact.cols, rows: bestExact.rows };
        
        // 4. LÓGICA DE APROXIMAÇÃO (Primos ou grids que excederam 12 linhas com colunas baixas)
        // Aqui também garantimos que a aproximação não gere mais de 12 colunas, a menos que seja quadrado perfeito
        let c = Math.ceil(Math.sqrt(n));
        // Se a aproximação passar de 12 colunas e não for quadrado perfeito, limitamos a 12
        if (c > 12) c = 12; 
        
        const r = Math.ceil(n / c);
        return { cols: c, rows: r };
    }

    if (shape === 'rect') {
        const { cols, rows } = getBestGrid(total);
        
        let cw = (width - padding) / cols;
        let ch = (height - padding) / rows;

        // Ajuste dinâmico de tamanho para respeitar o minBlockSize
        let finalWidth = width;
        if (cw < minBlockSize) {
            cw = minBlockSize;
            finalWidth = (cols * cw) + padding;
        }

        let finalHeight = height;
        if (ch < minBlockSize) {
            ch = minBlockSize;
            finalHeight = (rows * ch) + padding;
        }

        svg.setAttribute('width', finalWidth);
        svg.setAttribute('height', finalHeight);
        svg.setAttribute('viewBox', `0 0 ${finalWidth} ${finalHeight}`);

        for (let i = 0; i < total; i++) {
            const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
            const col = i % cols;
            const row = Math.floor(i / cols);

            rect.setAttribute('x', (padding / 2) + col * cw);
            rect.setAttribute('y', (padding / 2) + row * ch);
            rect.setAttribute('width', Math.max(0, cw - 4));
            rect.setAttribute('height', Math.max(0, ch - 4));
            rect.setAttribute('fill', i < filled ? color : offColor);
            rect.setAttribute('stroke', '#333');
            rect.setAttribute('stroke-width', '1.5');
            rect.setAttribute('rx', '3'); 

            svg.appendChild(rect);
        }
    } else {
        // Lógica circular original
        svg.setAttribute('width', width);
        svg.setAttribute('height', height);
        const r = width * 0.42;
        const cy = height / 2;

        if (total === 1) {
            const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            c.setAttribute('cx', cx); c.setAttribute('cy', cy); c.setAttribute('r', r);
            c.setAttribute('fill', filled >= 1 ? color : offColor);
            c.setAttribute('stroke', '#333'); c.setAttribute('stroke-width', '2');
            svg.appendChild(c);
        } else {
            const ang = (2 * Math.PI) / total;
            for (let i = 0; i < total; i++) {
                const sA = i * ang - Math.PI / 2;
                const eA = (i + 1) * ang - Math.PI / 2;
                const p = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                let d = `M ${cx} ${cy} `;
                if (shape === 'star') {
                    const outerR = r, innerR = r * 0.45, midA = (sA + eA) / 2;
                    d += `L ${cx + outerR * Math.cos(sA)} ${cy + outerR * Math.sin(sA)} L ${cx + innerR * Math.cos(midA)} ${cy + innerR * Math.sin(midA)} L ${cx + outerR * Math.cos(eA)} ${cy + outerR * Math.sin(eA)} Z`;
                } else if (shape === 'poly') {
                    d += `L ${cx + r * Math.cos(sA)} ${cy + r * Math.sin(sA)} L ${cx + r * Math.cos(eA)} ${cy + r * Math.sin(eA)} Z`;
                } else {
                    d += `L ${cx + r * Math.cos(sA)} ${cy + r * Math.sin(sA)} A ${r} ${r} 0 0 1 ${cx + r * Math.cos(eA)} ${cy + r * Math.sin(eA)} Z`;
                }
                p.setAttribute('d', d);
                p.setAttribute('fill', i < filled ? color : offColor);
                p.setAttribute('stroke', '#333'); p.setAttribute('stroke-width', '2');
                svg.appendChild(p);
            }
        }
    }
    return svg;
}
function createFractionBlock(num,den,shape,color,opTop=null,opBot=null,hideLabel=false){
    const group=document.createElement('div');group.className='fraction-group';
    const stack=document.createElement('div');stack.className='unit-stack';
    let rem=Math.abs(num);
    const units=Math.ceil(rem/den)||1;
    for(let i=0;i<units;i++){
        const fill=Math.min(den,rem);
        stack.appendChild(drawSVG(shape,fill,den,color));
        rem-=den;
    }
    group.appendChild(stack);
    if(!hideLabel){
        const label=document.createElement('div');label.className='math-label';
        label.innerHTML=`<div>${num}${opTop?`<span class="op-indicator op-top">${opTop}</span>`:''}</div>
                         <div class="fraction-line"></div>
                         <div>${den}${opBot?`<span class="op-indicator op-bot">${opBot}</span>`:''}</div>`;
        group.appendChild(label);
    }
    return group; group;
}

function estimateImageCount(num,den){return Math.ceil(Math.abs(num)/den)||1;}
function checkAndWarn(id,n){document.getElementById(id).style.display=n>12?'inline':'none';}
function confirmIfHeavy(n){
    if(n>20) return confirm(`⚠️ Atenção!\n\nEssa combinação vai gerar ${n} imagens ao mesmo tempo e pode travar o navegador.\n\nDeseja continuar mesmo assim?`);
    return true;
}

function checkDen(){
    const den=parseInt(document.getElementById('v-den').value)||1;
    const sel=document.getElementById('v-shape');
    for(let o of sel.options){
        if(o.value==='star'||o.value==='poly'){o.disabled=den<3;if(den<3&&sel.value===o.value)sel.value='circle';}
    }
}

function setEquivMode(mode){
    equivMode=mode;
    document.getElementById('btn-mode-mult').classList.toggle('active',mode==='mult');
    document.getElementById('btn-mode-div').classList.toggle('active',mode==='div');
    document.getElementById('wrapper-mult').style.display=mode==='mult'?'flex':'none';
    document.getElementById('wrapper-div').style.display=mode==='div'?'flex':'none';
    renderEquiv();
}

function updateEquivUI(){
    const n=Math.abs(parseInt(document.getElementById('e-num').value)||0);
    const d=Math.abs(parseInt(document.getElementById('e-den').value)||1);
    const common=gcd(n,d);
    currentDivisors=[];
    for(let i=1;i<=common;i++) if(common%i===0) currentDivisors.push(i);
    const irr=common===1;
    document.getElementById('irredutivel-msg').style.display=irr?'inline':'none';
    document.getElementById('btn-mode-div').style.display=irr?'none':'inline-block';
    if(irr&&equivMode==='div'){setEquivMode('mult');return;}
    const sl=document.getElementById('e-slider-div');
    sl.min=0;sl.max=currentDivisors.length-1;
    if(parseInt(sl.value)>sl.max)sl.value=sl.max;
    renderEquiv();
}

function render(){
    const n=parseInt(document.getElementById('v-num').value)||0;
    const d=parseInt(document.getElementById('v-den').value)||1;
    const hide=document.getElementById('v-hide-label').checked;
    const c=estimateImageCount(n,d);checkAndWarn('v-warn',c);
    if(!confirmIfHeavy(c)) return;
    const out=document.getElementById('viz-output');out.innerHTML='';
    out.appendChild(createFractionBlock(n,d,document.getElementById('v-shape').value,document.getElementById('v-color').value,null,null,hide));
}

function renderCalc(){
    const n1=parseInt(document.getElementById('c1-num').value)||0,d1=parseInt(document.getElementById('c1-den').value)||1;
    const n2=parseInt(document.getElementById('c2-num').value)||0,d2=parseInt(document.getElementById('c2-den').value)||1;
    const op=document.getElementById('c-op').value,col=document.getElementById('c-color').value;
    const hide=document.getElementById('c-hide-label').checked;
    const cD=lcm(d1,d2);
    const resN=op==='+'?n1*(cD/d1)+n2*(cD/d2):n1*(cD/d1)-n2*(cD/d2);
    const allF=[[n1,d1],[n2,d2],...(d1!==d2?[[n1*(cD/d1),cD],[n2*(cD/d2),cD]]:[]),[resN,cD]];
    const tot=allF.reduce((a,[n,d])=>a+estimateImageCount(n,d),0);
    checkAndWarn('c-warn',tot);if(!confirmIfHeavy(tot)) return;
    const out=document.getElementById('calc-output');out.innerHTML='';
    const sym=t=>{const s=document.createElement('div');s.className='math-symbol';s.innerText=t;out.appendChild(s);};
    out.appendChild(createFractionBlock(n1,d1,'circle',col,null,null,hide));sym(op);
    out.appendChild(createFractionBlock(n2,d2,'circle',col,null,null,hide));sym('=');
    if(d1!==d2){
        out.appendChild(createFractionBlock(n1*(cD/d1),cD,'circle',col,null,null,hide));sym(op);
        out.appendChild(createFractionBlock(n2*(cD/d2),cD,'circle',col,null,null,hide));sym('=');
    }
    out.appendChild(createFractionBlock(resN,cD,'circle',col,null,null,hide));
    const rg=gcd(resN,cD);
    if(rg>1){sym('=');out.appendChild(createFractionBlock(resN/rg,cD/rg,'circle',col,null,null,hide));}
}

function renderEquiv(){
    const n=parseInt(document.getElementById('e-num').value)||0;
    const d=parseInt(document.getElementById('e-den').value)||1;
    const col=document.getElementById('e-color').value;
    const hide=document.getElementById('e-hide-label').checked;
    let tot;
    if(equivMode==='mult'){const m=parseInt(document.getElementById('e-slider-mult').value)||1;tot=estimateImageCount(n,d)+estimateImageCount(n*m,d*m);}
    else{const div=currentDivisors[parseInt(document.getElementById('e-slider-div').value)||0]||1;tot=estimateImageCount(n,d)+estimateImageCount(n/div,d/div);}
    checkAndWarn('e-warn',tot);if(!confirmIfHeavy(tot)) return;
    const out=document.getElementById('equiv-output');out.innerHTML='';
    const sym=t=>{const s=document.createElement('div');s.className='math-symbol';s.innerText=t;out.appendChild(s);};
    if(equivMode==='mult'){
        const m=parseInt(document.getElementById('e-slider-mult').value)||1;
        document.getElementById('e-mult-label').innerText=m;
        out.appendChild(createFractionBlock(n,d,'circle',col,`×${m}`,`×${m}`,hide));sym('=');
        out.appendChild(createFractionBlock(n*m,d*m,'circle',col,null,null,hide));
    } else {
        const idx=parseInt(document.getElementById('e-slider-div').value)||0;
        const div=currentDivisors[idx]||1;
        document.getElementById('e-div-label').innerText=div;
        out.appendChild(createFractionBlock(n,d,'circle',col,`÷${div}`,`÷${div}`,hide));sym('=');
        out.appendChild(createFractionBlock(n/div,d/div,'circle',col,null,null,hide));
    }
}

// ── RETA REAL ─────────────────────────────────────────────────────────────────
function buildRetaUI(){
    const list=document.getElementById('reta-fractions-list');list.innerHTML='';
    retaFractions.forEach((f,i)=>{
        const col=POINT_COLORS[i%POINT_COLORS.length];
        const row=document.createElement('div');row.className='reta-fraction-row';
        row.innerHTML=`
            <span style="display:inline-block;width:14px;height:14px;border-radius:50%;background:${col};border:1.5px solid #333;flex-shrink:0;"></span>
            <label style="font-weight:bold;font-size:.9rem;color:#636e72;">Fração ${i+1}:</label>
            <input type="number" value="${f.num}" style="width:55px;border:1px solid #ddd;border-radius:6px;padding:5px;font-weight:900;font-size:1.1rem;text-align:center;" oninput="retaFractions[${i}].num=parseInt(this.value)||0;renderReta();">
            <span style="font-weight:bold;font-size:1.2rem;">/</span>
            <input type="number" value="${f.den}" min="1" style="width:55px;border:1px solid #ddd;border-radius:6px;padding:5px;font-weight:900;font-size:1.1rem;text-align:center;" oninput="retaFractions[${i}].den=Math.max(1,parseInt(this.value)||1);renderReta();">
            ${retaFractions.length>1?`<button class="btn btn-remove" onclick="removeRetaFraction(${i})">Remover</button>`:''}
        `;
        list.appendChild(row);
    });
}
function addRetaFraction(){retaFractions.push({num:1,den:2});buildRetaUI();renderReta();}
function removeRetaFraction(i){retaFractions.splice(i,1);buildRetaUI();renderReta();}

function drawFractionLabel(ctx,num,den,x,y,color,hide){
    if(hide){
        ctx.font='bold 20px Arial';ctx.fillStyle=color;ctx.textAlign='center';
        ctx.fillText('?',x,y);return;
    }
    const ns=String(num),ds=String(den);
    ctx.font='bold 16px Arial';ctx.fillStyle=color;ctx.textAlign='center';
    ctx.fillText(ns,x,y-4);
    const lw=Math.max(ctx.measureText(ns).width,ctx.measureText(ds).width)+6;
    ctx.beginPath();ctx.moveTo(x-lw/2,y+2);ctx.lineTo(x+lw/2,y+2);
    ctx.strokeStyle=color;ctx.lineWidth=1.8;ctx.stroke();
    ctx.fillText(ds,x,y+18);
}

function renderRetaOnCanvas(canvasId, fractions, hideLabels) {
    const canvas = document.getElementById(canvasId);
    const ctx = canvas.getContext('2d');

    ctx.clearRect(0,0,canvas.width,canvas.height);

    const margin = 60;
    const y = 120;
    const width = canvas.width - margin*2;

    // 🔥 valores (agora com negativos)
    const values = fractions.map(f => f.num / f.den);

    let minVal = Math.floor(Math.min(...values));
    let maxVal = Math.ceil(Math.max(...values));

    // 🔥 garante que o zero apareça
    minVal = Math.min(minVal, 0);
    maxVal = Math.max(maxVal, 0);

    const range = maxVal - minVal || 1;
    const step = width / range;

    // 🔥 MMC para subdivisão
    function gcd(a,b){ return b===0 ? Math.abs(a) : gcd(b,a%b); }
    function lcm(a,b){ return Math.abs(a*b)/(gcd(a,b)||1); }

    let mmc = fractions
        .map(f => f.den)
        .reduce((acc, d) => lcm(acc, d), 1);

    mmc = Math.min(mmc, 20);

    // ───────── eixo ─────────
    ctx.beginPath();
    ctx.moveTo(margin, y);
    ctx.lineTo(margin + width, y);
    ctx.strokeStyle='#333';
    ctx.lineWidth=3;
    ctx.stroke();

    // seta direita
    ctx.beginPath();
    ctx.moveTo(margin+width,y);
    ctx.lineTo(margin+width-10,y-6);
    ctx.lineTo(margin+width-10,y+6);
    ctx.closePath();
    ctx.fill();

    // seta esquerda 🔥
    ctx.beginPath();
    ctx.moveTo(margin,y);
    ctx.lineTo(margin+10,y-6);
    ctx.lineTo(margin+10,y+6);
    ctx.closePath();
    ctx.fill();

    // ───────── marcações ─────────
    for(let i=minVal;i<=maxVal;i++){
        const baseX = margin + (i - minVal) * step;

        // inteiro
        ctx.beginPath();
        ctx.moveTo(baseX,y-15);
        ctx.lineTo(baseX,y+15);
        ctx.strokeStyle='#333';
        ctx.lineWidth=2;
        ctx.stroke();

        ctx.font='bold 16px Arial';
        ctx.fillStyle='#333';
        ctx.textAlign='center';
        ctx.fillText(i,baseX,y+35);

        // 🔥 subdivisões (FUNCIONA NOS NEGATIVOS)
        if(i < maxVal){
            for(let j=1;j<mmc;j++){
                const x = baseX + (j/mmc)*step;

                ctx.beginPath();
                ctx.moveTo(x,y-8);
                ctx.lineTo(x,y+8);
                ctx.strokeStyle='#bbb';
                ctx.lineWidth=1;
                ctx.stroke();
            }
        }
    }

    // ───────── pontos ─────────
    fractions.forEach((f,i)=>{
        const col=POINT_COLORS[i%POINT_COLORS.length];
        const value = f.num / f.den;

        const posX = margin + (value - minVal) * step;

        ctx.beginPath();
        ctx.arc(posX,y,8,0,Math.PI*2);
        ctx.fillStyle=col;
        ctx.fill();

        ctx.strokeStyle='#333';
        ctx.lineWidth=1;
        ctx.stroke();

        if(!hideLabels){
            drawFractionLabel(ctx,f.num,f.den,posX,y-30,col,false);
        } else {
            ctx.font='bold 24px Arial';
            ctx.fillStyle=col;
            ctx.fillText('?',posX,y-25);
        }
    });
}
function renderReta(){
    renderRetaOnCanvas('retaCanvas', retaFractions, document.getElementById('r-hide-label').checked);
}

// ── QUIZ ──────────────────────────────────────────────────────────────────────
const QUIZ_COLORS=['#FF6B6B','#4ECDC4','#6c5ce7','#00b894','#e17055','#0984e3'];
const SHAPES=['circle','rect','poly','star'];

function newQuizQuestion(){
    quizAnswered=false;
    document.getElementById('quiz-feedback').innerText='';
    const diff=document.getElementById('q-diff').value;
    const type=document.getElementById('q-type').value;
    const maxDen=diff==='easy'?4:diff==='med'?8:12;
    
    const den=rnd(2,maxDen);
    const num=rnd(1,den);
    quizAnswer={num,den};
    
    const visual=document.getElementById('quiz-visual');
    visual.innerHTML='';
    const qText = document.getElementById('quiz-question-text');

    if(type === 'visual') {
        qText.innerText = "Que fração está representada?";
        let shape=SHAPES[rnd(0,SHAPES.length-1)];
        if((shape==='star'||shape==='poly')&&den<3) shape='circle';
        const color=QUIZ_COLORS[rnd(0,QUIZ_COLORS.length-1)];
        const block=createFractionBlock(num,den,shape,color,null,null,true);
        block.style.transform='scale(0.55)';block.style.transformOrigin='top center';
        block.style.marginBottom='-120px';
        visual.appendChild(block);
    } 
    else if(type === 'reta') {
        qText.innerText = "Qual é a fração indicada na reta real?";
        const canvas = document.createElement('canvas');
        canvas.width = 600; canvas.height = 180;
        canvas.id = "quizRetaCanvas";
        visual.appendChild(canvas);
        setTimeout(() => renderRetaOnCanvas('quizRetaCanvas', [{num, den}], true), 10);
    }
    else if(type === 'equiv') {
        qText.innerText = "Qual fração abaixo é equivalente à fração apresentada?";
        const label = document.createElement('div');
        label.className = 'math-label';
        label.innerHTML = `<div>${num}</div><div class="fraction-line"></div><div>${den}</div>`;
        visual.appendChild(label);
    }

    // Gerar opções
    const options=[{num,den}];
    const attempts=new Set([`${num}/${den}`]);
    
    if(type === 'equiv') {
        // Para equivalência, a resposta correta deve ser uma versão multiplicada ou simplificada
        const factor = rnd(2, 4);
        options[0] = {num: num*factor, den: den*factor};
        attempts.add(`${num*factor}/${den*factor}`);
    }

    while(options.length<4){
        let wn,wd;
        wn = rnd(1, maxDen); wd = rnd(2, maxDen);
        const key=`${wn}/${wd}`;
        if(!attempts.has(key) && wn/wd !== num/den){
            attempts.add(key);
            options.push({num:wn,den:wd});
        }
    }
    options.sort(()=>Math.random()-0.5);

    const optDiv=document.getElementById('quiz-options');optDiv.innerHTML='';
    options.forEach(o=>{
        const btn=document.createElement('button');
        btn.style.cssText='padding:14px 28px;border-radius:10px;border:2.5px solid #ddd;background:white;font-size:1.3rem;font-weight:900;cursor:pointer;transition:0.2s;min-width:90px;';
        btn.innerHTML=`<span style="display:flex;flex-direction:column;align-items:center;line-height:1.2;">${o.num}<span style="border-top:2.5px solid #333;padding-top:2px;font-size:1.3rem;">${o.den}</span></span>`;
        btn.onclick=()=>answerQuiz(o,btn);
        optDiv.appendChild(btn);
    });
}

function answerQuiz(chosen,btn){
    if(quizAnswered) return;
    quizAnswered=true; quizTotal++;
    const type=document.getElementById('q-type').value;
    
    // Checa se a razão é a mesma (para suportar equivalência)
    const correct = Math.abs((chosen.num/chosen.den) - (quizAnswer.num/quizAnswer.den)) < 0.0001;
    
    if(correct){
        quizScore++;btn.style.background='#00b894';btn.style.borderColor='#00b894';btn.style.color='white';
        document.getElementById('quiz-feedback').innerHTML='<span style="color:#00b894">✓ Correto! 🎉</span>';
    } else {
        btn.style.background='#d63031';btn.style.borderColor='#d63031';btn.style.color='white';
        document.getElementById('quiz-feedback').innerHTML=`<span style="color:#d63031">✗ A resposta era ${quizAnswer.num}/${quizAnswer.den}</span>`;
    }
    document.getElementById('q-score').innerText=quizScore;
    document.getElementById('q-total').innerText=quizTotal;
}

function switchTab(e,tab){
    document.querySelectorAll('.panel,.tab-btn').forEach(el=>el.classList.remove('active'));
    document.getElementById(tab).classList.add('active');
    e.currentTarget.classList.add('active');
    if(tab==='numberline'){buildRetaUI();renderReta();}
    if(tab==='quiz') newQuizQuestion();
}

async function copyImage(id){
    const canvas=await html2canvas(document.getElementById(id),{backgroundColor:null,scale:2});
    canvas.toBlob(blob=>{navigator.clipboard.write([new ClipboardItem({'image/png':blob})]).then(()=>showToast('Imagem Copiada'));});
}
async function downloadImage(id){
    const canvas=await html2canvas(document.getElementById(id),{backgroundColor:null,scale:2});
    const link=document.createElement('a');link.download='fracao.png';link.href=canvas.toDataURL('image/png');link.click();
    showToast('Download Iniciado');
}
function showToast(msg){const t=document.getElementById('toast');t.innerText=msg;t.className='show';setTimeout(()=>t.className='',2500);}

window.onload=()=>{render();renderCalc();updateEquivUI();buildRetaUI();renderReta();};
