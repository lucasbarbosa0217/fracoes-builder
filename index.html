<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora e Visualizador de Frações</title>
    <style>
        :root {
            --primary: #1976D2;
            --bg: #F8F9FA;
            --surface: #FFFFFF;
            --text: #202124;
            --text-secondary: #5f6368;
            --border: #DADCE0;
            --empty-stroke: #9E9E9E;
        }

        body { font-family: 'Roboto', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 950px; margin: 0 auto; background: var(--surface); padding: 32px; border-radius: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        h1 { font-size: 2.5rem; color: var(--primary); margin-bottom: 32px; font-weight: 400; }
        
        .tabs { display: flex; gap: 32px; border-bottom: 1px solid var(--border); margin-bottom: 32px; }
        .tab-btn { padding: 16px 0; cursor: pointer; border: none; background: none; font-size: 1.1rem; font-weight: 600; color: var(--text-secondary); transition: 0.3s; }
        .tab-btn.active { color: var(--primary); border-bottom: 3px solid var(--primary); }

        .panel { display: none; }
        .panel.active { display: block; }

        .controls { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; margin-bottom: 32px; background: #F1F3F4; padding: 20px; border-radius: 12px; }
        input[type="number"] { width: 70px; padding: 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 1rem; }
        input[type="color"] { border: none; width: 44px; height: 44px; cursor: pointer; background: none; }
        select { padding: 10px; border: 1px solid var(--border); border-radius: 6px; background: white; font-size: 1rem; }

        .result-area { display: flex; gap: 24px; overflow-x: auto; padding: 16px; align-items: center; min-height: 220px; }
        .canvas-wrapper { display: flex; align-items: center; gap: 10px; padding: 20px; border: 1px solid var(--border); border-radius: 12px; background: #FFF; flex-wrap: wrap; }
    </style>
</head>
<body>

<div class="container">
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('visualizer')">Visualizador</button>
        <button class="tab-btn" onclick="switchTab('calculator')">Calculadora</button>
    </div>

    <div id="visualizer" class="panel active">
        <h1>Visualizador de Frações</h1>
        <div class="controls">
            <input type="number" id="v-num" value="1" min="1" oninput="render()">
            <span>/</span>
            <input type="number" id="v-den" value="1" min="1" oninput="render(); updateShapeOptions();">
            <select id="v-shape" onchange="render()">
                <option value="rect">Retângulo</option>
                <option value="circle">Círculo</option>
                <option value="polygon">Polígono</option>
                <option value="star">Estrela</option>
            </select>
            <input type="color" id="v-color" value="#1976D2" oninput="render()">
        </div>
        <div id="viz-output" class="result-area"></div>
    </div>

    <div id="calculator" class="panel">
        <h1>Calculadora de Frações</h1>
        <div class="controls">
            <input type="number" id="c1-num" value="1" oninput="renderCalc()"> / 
            <input type="number" id="c1-den" value="4" min="1" oninput="renderCalc()">
            <select id="c-op" onchange="renderCalc()"><option value="+">+</option><option value="-">-</option></select>
            <input type="number" id="c2-num" value="1" oninput="renderCalc()"> / 
            <input type="number" id="c2-den" value="2" min="1" oninput="renderCalc()">
            <select id="c-shape" onchange="renderCalc()">
                <option value="rect">Retângulo</option>
                <option value="circle">Círculo</option>
            </select>
            <input type="color" id="c-color" value="#1976D2" oninput="renderCalc()">
        </div>
        <div id="calc-output" class="result-area"></div>
    </div>
</div>

<script>
    const gcd = (a, b) => b === 0 ? a : gcd(b, a % b);
    const lcm = (a, b) => (a * b) / gcd(a, b);

    // Lógica de restrição de formas
    function updateShapeOptions() {
        const den = parseInt(document.getElementById('v-den').value);
        const select = document.getElementById('v-shape');
        
        // Bloqueios
        const blockPolygon = den <= 2; // Bloqueia polígono para den 1 ou 2
        const blockStar = den <= 1;    // Bloqueia estrela para den 1
        
        select.options[2].disabled = blockPolygon;
        select.options[3].disabled = blockStar;
        
        // Resetar para retângulo se o usuário estiver numa opção que foi bloqueada
        if ((blockPolygon && select.value === 'polygon') || (blockStar && select.value === 'star')) {
            select.value = 'rect';
            render();
        }
    }

    function getBorderColor(hex) {
        let r = parseInt(hex.slice(1,3), 16);
        let g = parseInt(hex.slice(3,5), 16);
        let b = parseInt(hex.slice(5,7), 16);
        return `rgb(${Math.floor(r*0.5)}, ${Math.floor(g*0.5)}, ${Math.floor(b*0.5)})`;
    }

    function drawUnit(shape, filledParts, totalParts, color, size = 120) {
        const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
        svg.setAttribute("width", size);
        svg.setAttribute("height", size);
        svg.setAttribute("viewBox", `0 0 ${size} ${size}`);
        
        const borderColor = getBorderColor(color);
        const emptyStroke = "#9E9E9E";
        const cx = size/2, cy = size/2, r = size * 0.45;

        // Caso especial para quando temos apenas 1 peça total (1/1)
        if (totalParts === 1) {
            if (shape === 'rect') {
                svg.innerHTML = `<rect x="0" y="0" width="${size}" height="${size}" fill="${filledParts >= 1 ? color : '#FFFFFF'}" stroke="${filledParts >= 1 ? borderColor : emptyStroke}" stroke-width="2"/>`;
            } else if (shape === 'circle') {
                svg.innerHTML = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${filledParts >= 1 ? color : '#FFFFFF'}" stroke="${filledParts >= 1 ? borderColor : emptyStroke}" stroke-width="2"/>`;
            } else {
                // Para polígono/estrela em 1/1, desenha o formato inteiro
                const vertices = (shape === 'polygon') ? 6 : 10;
                const angleStep = 2 * Math.PI / vertices;
                let d = `M `;
                for(let i=0; i<vertices; i++){
                    const ang = i * angleStep - Math.PI/2;
                    const dist = (shape === 'star' && i % 2 !== 0) ? r * 0.5 : r;
                    d += `${cx + dist * Math.cos(ang)} ${cy + dist * Math.sin(ang)} L `;
                }
                d = d.slice(0, -3) + " Z";
                svg.innerHTML = `<path d="${d}" fill="${filledParts >= 1 ? color : '#FFFFFF'}" stroke="${filledParts >= 1 ? borderColor : emptyStroke}" stroke-width="2"/>`;
            }
            return svg;
        }

        // Renderização padrão para frações > 1
        if (shape === 'rect') {
            const root = Math.sqrt(totalParts);
            let cols = Math.min(totalParts, 8);
            let rows = Math.ceil(totalParts / cols);
            const w = size / cols, h = size / rows;
            for (let i = 0; i < totalParts; i++) {
                const isFilled = i < filledParts;
                svg.innerHTML += `<rect x="${(i % cols) * w}" y="${Math.floor(i / cols) * h}" width="${w}" height="${h}" fill="${isFilled ? color : '#FFFFFF'}" stroke="${isFilled ? borderColor : emptyStroke}" stroke-width="2"/>`;
            }
        } else if (shape === 'circle') {
            const angleStep = 2 * Math.PI / totalParts;
            // Desenha o fundo da fatia não preenchida
            for (let i = 0; i < totalParts; i++) {
                const isFilled = i < filledParts;
                const start = i * angleStep - Math.PI/2;
                const end = (i + 1) * angleStep - Math.PI/2;
                const x1 = cx + r * Math.cos(start), y1 = cy + r * Math.sin(start);
                const x2 = cx + r * Math.cos(end), y2 = cy + r * Math.sin(end);
                
                svg.innerHTML += `<path d="M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 0 1 ${x2} ${y2} Z" fill="${isFilled ? color : '#FFFFFF'}" stroke="${isFilled ? borderColor : emptyStroke}" stroke-width="2"/>`;
            }
        } else {
            const vertices = (shape === 'polygon') ? totalParts : totalParts * 2;
            const angleStep = 2 * Math.PI / vertices;
            
            for (let i = 0; i < totalParts; i++) {
                const isFilled = i < filledParts;
                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                let d = `M ${cx} ${cy} `;
                const step = (shape === 'polygon' ? 1 : 2);
                for(let j=0; j<=step; j++) {
                    const idx = i * step + j;
                    const angle = idx * angleStep - Math.PI/2;
                    const dist = (shape === 'star' && idx % 2 !== 0) ? r * 0.5 : r;
                    d += `L ${cx + dist * Math.cos(angle)} ${cy + dist * Math.sin(angle)} `;
                }
                d += "Z";
                path.setAttribute("d", d);
                path.setAttribute("fill", isFilled ? color : '#FFFFFF');
                path.setAttribute("stroke", isFilled ? borderColor : emptyStroke);
                path.setAttribute("stroke-width", "2");
                svg.appendChild(path);
            }
        }
        return svg;
    }

    function render() {
        const num = parseInt(document.getElementById('v-num').value);
        const den = parseInt(document.getElementById('v-den').value);
        const shape = document.getElementById('v-shape').value;
        const color = document.getElementById('v-color').value;
        const container = document.getElementById('viz-output');
        container.innerHTML = '';
        if(den <= 0) return;
        const units = Math.ceil(num / den);
        for(let i=0; i<units; i++) {
            const filled = Math.min(den, num - (i * den));
            container.appendChild(drawUnit(shape, filled, den, color));
        }
    }

    function renderCalc() {
        const n1 = parseInt(document.getElementById('c1-num').value);
        const d1 = parseInt(document.getElementById('c1-den').value);
        const n2 = parseInt(document.getElementById('c2-num').value);
        const d2 = parseInt(document.getElementById('c2-den').value);
        const op = document.getElementById('c-op').value;
        const shape = document.getElementById('c-shape').value;
        const color = document.getElementById('c-color').value;
        const container = document.getElementById('calc-output');
        container.innerHTML = '';
        if(d1 <= 0 || d2 <= 0) return;

        const flow = document.createElement('div');
        flow.className = 'canvas-wrapper';
        
        flow.appendChild(drawUnit(shape, n1, d1, color, 80));
        flow.innerHTML += `<div style="padding:0 8px; font-size:20px; font-weight:bold">${op}</div>`;
        flow.appendChild(drawUnit(shape, n2, d2, color, 80));
        
        if(d1 !== d2) {
            flow.innerHTML += `<div style="padding:0 8px; font-size:20px; font-weight:bold">→</div>`;
            const common = lcm(d1, d2);
            flow.appendChild(drawUnit(shape, n1*(common/d1), common, color, 80));
            flow.innerHTML += `<div style="padding:0 8px; font-size:20px; font-weight:bold">${op}</div>`;
            flow.appendChild(drawUnit(shape, n2*(common/d2), common, color, 80));
        }

        const resN = (op === '+') ? (n1*(lcm(d1,d2)/d1) + n2*(lcm(d1,d2)/d2)) : (n1*(lcm(d1,d2)/d1) - n2*(lcm(d1,d2)/d2));
        const resD = lcm(d1, d2);
        flow.innerHTML += `<div style="padding:0 8px; font-size:20px; font-weight:bold">=</div>`;
        flow.appendChild(drawUnit(shape, resN, resD, color, 80));

        const commonDiv = gcd(Math.abs(resN), resD);
        if(commonDiv > 1) {
            flow.innerHTML += `<div style="padding:0 8px; font-size:20px; font-weight:bold">→</div>`;
            flow.appendChild(drawUnit(shape, resN/commonDiv, resD/commonDiv, color, 80));
        }
        container.appendChild(flow);
    }

    function switchTab(tab) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tab).classList.add('active');
        event.target.classList.add('active');
    }

    document.addEventListener("DOMContentLoaded", () => { render(); renderCalc(); updateShapeOptions(); });
</script>
</body>
</html>
