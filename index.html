<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Frações</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --primary: #FF6B6B;
            --secondary: #4ECDC4;
            --bg: #F7F9FC;
            --text: #2D3436;
            --empty: #F1F3F5;
        }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; padding: 20px;
        }

        .container { 
            max-width: 1300px; 
            margin: 0 auto; 
            background: white; 
            padding: 30px; 
            border-radius: 25px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .header { display: flex; gap: 10px; margin-bottom: 25px; border-bottom: 2px solid #eee; }
        .tab-btn { 
            padding: 12px 25px; cursor: pointer; border: none; background: none; 
            font-size: 1rem; font-weight: bold; color: #b2bec3; transition: 0.3s;
        }
        .tab-btn.active { color: var(--primary); border-bottom: 4px solid var(--primary); }

        .panel { display: none; }
        .panel.active { display: block; }

        .controls { 
            display: flex; gap: 20px; align-items: center; flex-wrap: wrap; 
            margin-bottom: 30px; padding: 20px; background: #f8f9fa; border-radius: 15px;
        }
        
        .input-group { 
            background: white; padding: 10px 15px; border-radius: 12px; 
            display: flex; align-items: center; gap: 10px; border: 1px solid #ddd;
        }
        
        input[type="number"] { width: 55px; border: none; font-weight: 900; font-size: 1.2rem; outline: none; text-align: center; }
        select { border: none; font-weight: bold; padding: 5px; cursor: pointer; background: transparent; }
        input[type="color"] { border: none; width: 35px; height: 35px; cursor: pointer; background: none; }

        /* Scroll Horizontal sem quebra de linha */
        .scroll-wrapper {
            width: 100%;
            overflow-x: auto;
            background: white;
            border: 1px solid #eee;
            border-radius: 15px;
            margin-bottom: 15px;
        }

        .capture-zone { 
            padding: 40px; 
            background: white; 
            display: inline-block; /* Importante para o html2canvas pegar a largura total */
            min-width: 100%;
        }

        .result-row { 
            display: flex; 
            align-items: center; 
            flex-wrap: nowrap; /* TUDO EM UMA LINHA SÓ */
            gap: 25px;
            padding: 10px;
        }

        .fraction-group { display: flex; flex-direction: column; align-items: center; gap: 15px; flex-shrink: 0; }
        .unit-stack { display: flex; gap: 10px; flex-wrap: nowrap; justify-content: center; }
        
        .math-label { text-align: center; font-weight: 900; font-size: 26px; margin-top: 10px; }
        .fraction-line { border-bottom: 3px solid #333; width: 45px; margin: 5px auto; }
        .math-symbol { font-size: 50px; font-weight: bold; margin: 0 10px; flex-shrink: 0; }
        
        .btn-copy { 
            background: var(--secondary); color: white; border: none; 
            padding: 18px 45px; border-radius: 15px; cursor: pointer; 
            font-weight: bold; font-size: 1.1rem; box-shadow: 0 5px 0 #3db3ab;
        }
        .btn-copy:active { transform: translateY(3px); box-shadow: 0 2px 0 #3db3ab; }

        #toast {
            visibility: hidden; position: fixed; left: 50%; bottom: 30px; 
            transform: translateX(-50%); background: #2d3436; color: white;
            padding: 15px 30px; border-radius: 50px; font-weight: bold; z-index: 1000;
        }
        #toast.show { visibility: visible; animation: fadeInOut 2.5s; }

        @keyframes fadeInOut {
            0% { opacity: 0; bottom: 0; }
            20% { opacity: 1; bottom: 30px; }
            80% { opacity: 1; bottom: 30px; }
            100% { opacity: 0; bottom: 0; }
        }
    </style>
</head>
<body>

<div id="toast">✨ Imagem Copiada! ✨</div>

<div class="container">
    <div class="header">
        <button class="tab-btn active" onclick="switchTab(event, 'visualizer')">🎨 Visualizador</button>
        <button class="tab-btn" onclick="switchTab(event, 'calculator')">🧮 Calculadora</button>
    </div>

    <div id="visualizer" class="panel active">
        <div class="controls">
            <div class="input-group">
                <input type="number" id="v-num" value="5" oninput="render()">
                <span style="font-weight: bold; color: #ccc;">/</span>
                <input type="number" id="v-den" value="4" min="1" oninput="checkDen('v'); render();">
            </div>
            <select id="v-shape" onchange="render()">
                <option value="rect">Retângulos</option>
                <option value="circle">Círculos</option>
                <option value="star">Estrelas</option>
                <option value="heart">Corações</option>
                <option value="poly">Polígonos</option>
            </select>
            <input type="color" id="v-color" value="#FF6B6B" oninput="render()">
        </div>
        <div class="scroll-wrapper">
            <div id="v-capture" class="capture-zone">
                <div id="viz-output" class="result-row"></div>
            </div>
        </div>
        <button class="btn-copy" onclick="copyImage('v-capture')">Copiar Imagem</button>
    </div>

    <div id="calculator" class="panel">
        <div class="controls">
            <div class="input-group">
                <input type="number" id="c1-num" value="1" oninput="renderCalc()">
                <span>/</span>
                <input type="number" id="c1-den" value="2" min="1" oninput="checkDen('c'); renderCalc();">
            </div>
            <select id="c-op" onchange="renderCalc()"><option value="+">+</option><option value="-">-</option></select>
            <div class="input-group">
                <input type="number" id="c2-num" value="1" oninput="renderCalc()">
                <span>/</span>
                <input type="number" id="c2-den" value="4" min="1" oninput="checkDen('c'); renderCalc();">
            </div>
            <select id="c-shape" onchange="renderCalc()">
                <option value="circle">Círculos</option>
                <option value="rect">Retângulos</option>
                <option value="star">Estrelas</option>
                <option value="poly">Polígonos</option>
            </select>
            <input type="color" id="c-color" value="#4ECDC4" oninput="renderCalc()">
        </div>
        <div class="scroll-wrapper">
            <div id="c-capture" class="capture-zone">
                <div id="calc-output" class="result-row"></div>
            </div>
        </div>
        <button class="btn-copy" onclick="copyImage('c-capture')">Copiar Processo Completo</button>
    </div>
</div>

<script>
    const gcd = (a, b) => b === 0 ? a : gcd(b, a % b);
    const lcm = (a, b) => Math.abs(a * b) / gcd(a, b);

    // Bloqueia polígono e estrela se den < 3
    function checkDen(tab) {
        const den = parseInt(document.getElementById(tab === 'v' ? 'v-den' : 'c1-den').value);
        const sel = document.getElementById(tab + '-shape');
        const options = sel.options;
        for (let opt of options) {
            if (opt.value === 'poly' || opt.value === 'star') {
                if (den < 3) {
                    opt.disabled = true;
                    if (sel.value === opt.value) sel.value = 'rect';
                } else {
                    opt.disabled = false;
                }
            }
        }
    }

    function drawSVG(shape, filled, total, color) {
        const size = 160;
        const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
        svg.setAttribute("width", size); svg.setAttribute("height", size);
        const cx = size/2, cy = size/2, r = size * 0.42;
        const offColor = "#F1F3F5";

        if (shape === 'rect') {
            const root = Math.sqrt(total);
            const cols = Number.isInteger(root) && total > 1 ? root : (total > 5 ? 5 : total);
            const rows = Math.ceil(total / cols);
            const cw = (size-20)/cols, ch = (size-20)/rows;
            for(let i=0; i<total; i++) {
                const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
                rect.setAttribute("x", 10 + (i%cols)*cw); rect.setAttribute("y", 10 + Math.floor(i/cols)*ch);
                rect.setAttribute("width", cw - 3); rect.setAttribute("height", ch - 3);
                rect.setAttribute("rx", "3");
                rect.setAttribute("fill", i < filled ? color : offColor);
                rect.setAttribute("stroke", "#333"); rect.setAttribute("stroke-width", "1.5");
                svg.appendChild(rect);
            }
        } else if (shape === 'circle') {
            for(let i=0; i<total; i++) {
                const ang = (2*Math.PI)/total;
                const s = i*ang - Math.PI/2, e = (i+1)*ang - Math.PI/2;
                const p = document.createElementNS("http://www.w3.org/2000/svg", "path");
                p.setAttribute("d", `M ${cx} ${cy} L ${cx+r*Math.cos(s)} ${cy+r*Math.sin(s)} A ${r} ${r} 0 0 1 ${cx+r*Math.cos(e)} ${cy+r*Math.sin(e)} Z`);
                p.setAttribute("fill", i < filled ? color : offColor);
                p.setAttribute("stroke", "#333"); p.setAttribute("stroke-width", "1.5");
                svg.appendChild(p);
            }
        } else {
            const isStar = shape === 'star';
            const rIn = isStar ? r * 0.4 : r;
            for(let i=0; i<total; i++) {
                const ang = (2*Math.PI)/total;
                const sA = i*ang - Math.PI/2, mA = sA + ang/2, eA = (i+1)*ang - Math.PI/2;
                const p = document.createElementNS("http://www.w3.org/2000/svg", "path");
                let d = `M ${cx} ${cy} L ${cx+r*Math.cos(sA)} ${cy+r*Math.sin(sA)} `;
                if(isStar) d += `L ${cx+rIn*Math.cos(mA)} ${cy+rIn*Math.sin(mA)} `;
                d += `L ${cx+r*Math.cos(eA)} ${cy+r*Math.sin(eA)} Z`;
                p.setAttribute("d", d);
                p.setAttribute("fill", i < filled ? color : offColor);
                p.setAttribute("stroke", "#333"); p.setAttribute("stroke-width", "1.5");
                svg.appendChild(p);
            }
        }
        return svg;
    }

    function drawHeart(filled, total, color) {
        const size = 160;
        const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
        svg.setAttribute("width", size); svg.setAttribute("height", size);
        const cols = Math.ceil(Math.sqrt(total));
        const cellSize = (size-20)/cols;
        for(let i=0; i<total; i++) {
            const p = document.createElementNS("http://www.w3.org/2000/svg", "path");
            const scale = cellSize/22;
            p.setAttribute("d", "M 10,3.22 C 8.6,1.4 6.3,0.5 4.3,0.5 1.9,0.5 0,2.4 0,4.8 0,10.2 10,16 10,16 10,16 20,10.2 20,4.8 20,2.4 18.1,0.5 15.7,0.5 13.7,0.5 11.4,1.4 10,3.22 Z");
            p.setAttribute("transform", `translate(${10+(i%cols)*cellSize}, ${10+Math.floor(i/cols)*cellSize}) scale(${scale})`);
            p.setAttribute("fill", i < filled ? color : "#F1F3F5");
            p.setAttribute("stroke", "#333");
            svg.appendChild(p);
        }
        return svg;
    }

    function createFractionBlock(num, den, shape, color) {
        const group = document.createElement('div'); group.className = 'fraction-group';
        const stack = document.createElement('div'); stack.className = 'unit-stack';
        let rem = Math.abs(num);
        const units = Math.ceil(rem / den) || 1;
        for(let i=0; i<units; i++) {
            const fill = Math.min(den, rem);
            stack.appendChild(shape === 'heart' ? drawHeart(fill, den, color) : drawSVG(shape, fill, den, color));
            rem -= fill;
        }
        group.appendChild(stack);
        const label = document.createElement('div'); label.className = 'math-label';
        label.innerHTML = `<div>${num}</div><div class="fraction-line"></div><div>${den}</div>`;
        group.appendChild(label);
        return group;
    }

    function render() {
        const n = parseInt(document.getElementById('v-num').value) || 0;
        const d = parseInt(document.getElementById('v-den').value) || 1;
        const out = document.getElementById('viz-output'); out.innerHTML = '';
        out.appendChild(createFractionBlock(n, d, document.getElementById('v-shape').value, document.getElementById('v-color').value));
    }

    function renderCalc() {
        const n1 = parseInt(document.getElementById('c1-num').value) || 0, d1 = parseInt(document.getElementById('c1-den').value) || 1;
        const n2 = parseInt(document.getElementById('c2-num').value) || 0, d2 = parseInt(document.getElementById('c2-den').value) || 1;
        const op = document.getElementById('c-op').value, sh = document.getElementById('c-shape').value, col = document.getElementById('c-color').value;
        const out = document.getElementById('calc-output'); out.innerHTML = '';
        
        const commonD = lcm(d1, d2);
        const n1e = n1*(commonD/d1), n2e = n2*(commonD/d2);
        const resN = (op === '+') ? (n1e + n2e) : (n1e - n2e);

        const sym = (t) => { const s = document.createElement('div'); s.className = 'math-symbol'; s.innerText = t; out.appendChild(s); };

        out.appendChild(createFractionBlock(n1, d1, sh, col));
        sym(op);
        out.appendChild(createFractionBlock(n2, d2, sh, col));
        sym("=");
        if(d1 !== d2) {
            out.appendChild(createFractionBlock(n1e, commonD, sh, col));
            sym(op);
            out.appendChild(createFractionBlock(n2e, commonD, sh, col));
            sym("=");
        }
        out.appendChild(createFractionBlock(resN, commonD, sh, col));
        const v = gcd(Math.abs(resN), commonD);
        if(v > 1 && resN !== 0) { sym("→"); out.appendChild(createFractionBlock(resN/v, commonD/v, sh, col)); }
    }

    function switchTab(e, tab) {
        document.querySelectorAll('.panel, .tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(tab).classList.add('active');
        e.currentTarget.classList.add('active');
    }

    async function copyImage(id) {
        const zone = document.getElementById(id);
        const canvas = await html2canvas(zone, { backgroundColor: "#ffffff", scale: 2 });
        canvas.toBlob(blob => {
            navigator.clipboard.write([new ClipboardItem({"image/png": blob})]).then(() => {
                const t = document.getElementById("toast"); t.className = "show";
                setTimeout(() => t.className = "", 2500);
            });
        });
    }

    window.onload = () => { checkDen('v'); checkDen('c'); render(); renderCalc(); };
</script>
</body>
</html>
